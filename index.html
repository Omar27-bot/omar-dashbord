<!DOCTYPE html>
<html lang="fr-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>OMAR_OS SOUVERAIN</title>
</head>
<body>
    <div id="hud-container">
        <header>
            <div class="status-bar">
                <span class="brand">OMAR_OS</span>
                <span class="sync-status">SYNC: ONLINE</span>
            </div>
            <div class="probability-engine">
                <div class="edge-card">
                    <span class="label">BUY EDGE</span>
                    <div class="bar-bg"><div id="buy-bar" class="bar green" style="width: 0%"></div></div>
                    <span id="buy-value" class="percent">0%</span>
                </div>
                <div class="edge-card">
                    <span class="label">SHORT EDGE</span>
                    <div class="bar-bg"><div id="short-bar" class="bar red" style="width: 0%"></div></div>
                    <span id="short-value" class="percent">0%</span>
                </div>
            </div>
        </header>

        <main id="chat-flow"></main>

        <footer>
            <input type="text" id="user-input" placeholder="Ordre souverain...">
            <button id="send-btn">SEND</button>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>O.M.A.R ? ZENITH MOBILE</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="omar-logo-512.jpg">

    <!-- STYLE -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hud-card" id="hud-root">

    <!-- CHAT ONLY -->
    <div class="header">
        <span class="gold">OMAR CHAT</span>
        <small id="omar-last-update" style="color: #777;">SYNC...</small>
    </div>

    <!-- CHAT -->
    <div id="chat-history"></div>

    <div class="input-group">
        <input type="text" id="user-input" placeholder="Ordre souverain...">
        <button id="send-btn">SEND</button>
    </div>

</div>

<!-- APP JS -->
<script type="module" src="app.js"></script>

<!-- SERVICE WORKER REGISTRATION -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js")
        .then(() => console.log("Service Worker enregistr?"))
        .catch(err => console.error("Erreur SW :", err));
}
</script>

</body>
</html>
